<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamChat Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #a855f7;
    --accent2: #06b6d4;
    --glow: rgba(168,85,247,0.4);
    --glow2: rgba(6,182,212,0.3);
    --msg-bg: rgba(10,10,20,0.75);
    --msg-border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --sub-text: #94a3b8;
    --font-size: 14px;
    --border-radius: 12px;
    --badge-size: 18px;
    --max-width: 340px;
  }

  body.theme-neon {
    --accent: #f0abfc; --accent2: #67e8f9;
    --glow: rgba(240,171,252,0.5); --glow2: rgba(103,232,249,0.4);
    --msg-bg: rgba(5,5,15,0.82);
  }
  body.theme-fire {
    --accent: #fb923c; --accent2: #fbbf24;
    --glow: rgba(251,146,60,0.5); --glow2: rgba(251,191,36,0.4);
    --msg-bg: rgba(15,5,0,0.82);
  }
  body.theme-ocean {
    --accent: #34d399; --accent2: #38bdf8;
    --glow: rgba(52,211,153,0.45); --glow2: rgba(56,189,248,0.35);
    --msg-bg: rgba(0,10,20,0.8);
  }
  body.theme-rose {
    --accent: #f472b6; --accent2: #fb7185;
    --glow: rgba(244,114,182,0.5); --glow2: rgba(251,113,133,0.4);
    --msg-bg: rgba(15,0,10,0.8);
  }
  body.theme-glass {
    --accent: #c7d2fe; --accent2: #a5f3fc;
    --glow: rgba(199,210,254,0.3); --glow2: rgba(165,243,252,0.25);
    --msg-bg: rgba(255,255,255,0.07);
    --msg-border: rgba(255,255,255,0.15);
  }
  body.theme-minimal {
    --accent: #f8fafc; --accent2: #94a3b8;
    --glow: transparent; --glow2: transparent;
    --msg-bg: rgba(15,23,42,0.9);
    --msg-border: rgba(255,255,255,0.05);
  }
  body.theme-cyber {
    --accent: #7cfc98; --accent2: #22d3ee;
    --glow: rgba(124,252,152,0.45); --glow2: rgba(34,211,238,0.3);
    --msg-bg: rgba(5,8,22,0.86);
    --msg-border: rgba(124,252,152,0.14);
  }
  body.theme-sunset {
    --accent: #fb7185; --accent2: #fbbf24;
    --glow: rgba(251,113,133,0.45); --glow2: rgba(251,191,36,0.3);
    --msg-bg: rgba(20,11,7,0.84);
    --msg-border: rgba(251,113,133,0.14);
  }
  body.theme-mono {
    --accent: #f8fafc; --accent2: #94a3b8;
    --glow: rgba(248,250,252,0.22); --glow2: rgba(148,163,184,0.2);
    --msg-bg: rgba(2,6,23,0.9);
    --msg-border: rgba(255,255,255,0.08);
  }

  html, body {
    background: transparent !important;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    font-size: var(--font-size);
  }

  #chat-wrap {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: var(--max-width);
    max-height: calc(100vh - 32px);
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
    overflow: hidden;
    pointer-events: none;
  }

  body.pos-left #chat-wrap { right: auto; left: 16px; }

  #goals-wrap {
    position: fixed;
    top: 14px;
    right: 16px;
    width: var(--max-width);
    display: none;
    gap: 6px;
    pointer-events: none;
  }

  body.pos-left #goals-wrap { right: auto; left: 16px; }

  .goal-card {
    background: rgba(10,10,20,0.8);
    border: 1px solid var(--msg-border);
    border-radius: var(--border-radius);
    padding: 8px 10px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 6px 22px rgba(0,0,0,0.36);
  }

  .goal-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--sub-text);
  }

  .goal-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 21px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .goal-sub {
    font-size: 11px;
    color: var(--text);
    margin-top: 3px;
  }

  .msg {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: var(--msg-bg);
    border: 1px solid var(--msg-border);
    border-radius: var(--border-radius);
    padding: 8px 10px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
    border-left: 3px solid var(--user-color, var(--accent));
    box-shadow:
      0 4px 24px rgba(0,0,0,0.4),
      0 0 0 0.5px rgba(255,255,255,0.04),
      inset 0 1px 0 rgba(255,255,255,0.06);
    max-width: var(--max-width);
    will-change: transform, opacity;
    transition: opacity 0.5s ease, transform 0.25s ease, filter 0.25s ease;
  }

  .msg::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    animation: shimmer 3s ease infinite;
  }

  @keyframes slideInRight {
    from { transform: translateX(120%); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-120%); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes popIn {
    0% { transform: scale(0.6); opacity: 0; }
    70% { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes floatIn {
    from { transform: translateY(20px) scale(0.96); opacity: 0; filter: blur(1px); }
    to   { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
  }
  @keyframes zoomIn {
    from { transform: scale(0.75); opacity: 0; filter: blur(2px); }
    70%  { transform: scale(1.03); }
    to   { transform: scale(1); opacity: 1; filter: blur(0); }
  }
  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 200%; }
  }
  @keyframes fadeOut { to { opacity: 0; transform: translateY(-8px); } }

  body.anim-slide .msg { animation: slideInRight 0.35s cubic-bezier(0.22,1,0.36,1) both; }
  body.anim-slide.pos-left .msg { animation: slideInLeft 0.35s cubic-bezier(0.22,1,0.36,1) both; }
  body.anim-pop .msg { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
  body.anim-fade .msg { animation: fadeIn 0.35s ease both; }
  body.anim-float .msg { animation: floatIn 0.45s cubic-bezier(0.22,1,0.36,1) both; }
  body.anim-zoom .msg { animation: zoomIn 0.42s cubic-bezier(0.22,1,0.36,1) both; }
  .msg.expired { animation: fadeOut 0.5s ease forwards !important; }

  body.layout-minimal .msg {
    border-radius: 8px;
    padding: 6px 8px;
  }

  body.layout-theater .msg {
    border-left-width: 4px;
  }

  .avatar {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    background: linear-gradient(135deg, var(--user-color, var(--accent)), var(--user-color, var(--accent2)));
    box-shadow: 0 0 10px var(--user-color, var(--glow));
    border: 1px solid rgba(255,255,255,0.14);
    overflow: hidden;
    text-transform: uppercase;
  }

  .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }

  .avatar .avatar-mark {
    position: absolute; right: -1px; bottom: -1px;
    width: 11px; height: 11px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 7px; line-height: 1;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.16);
    color: #fff;
  }

  .msg-content { flex: 1; min-width: 0; }
  .msg-header {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    margin-bottom: 3px;
  }

  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: var(--badge-size); height: var(--badge-size);
    border-radius: 4px; flex-shrink: 0;
  }
  .badge svg { width: 12px; height: 12px; }
  .badge-broadcaster { background: #ef4444; }
  .badge-moderator { background: #10b981; }
  .badge-subscriber { background: #8b5cf6; }
  .badge-vip { background: #f59e0b; }
  .badge-partner { background: #4f46e5; }
  .badge-prime { background: #00a8ff; }
  .badge-yt-member { background: #ff0000; }

  .username {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: calc(var(--font-size) + 1px);
    color: var(--user-color, var(--accent));
    text-shadow: 0 0 8px var(--user-color, var(--glow));
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .platform-tag {
    font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
    padding: 1px 5px; border-radius: 4px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.1);
    color: var(--sub-text);
  }
  .platform-tag.twitch { background: rgba(145,71,255,0.25); color: #c084fc; }
  .platform-tag.youtube { background: rgba(255,0,0,0.2); color: #f87171; }
  .platform-tag.kick { background: rgba(83,185,79,0.2); color: #4ade80; }

  .msg-text {
    color: var(--text);
    font-size: var(--font-size);
    line-height: 1.45;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .msg-text img.emote {
    height: 24px; vertical-align: middle;
    display: inline-block; margin: 0 1px;
  }

  .platform-icon {
    position: absolute; top: 6px; right: 8px;
    opacity: 0.18; width: 14px; height: 14px;
  }

  .msg.event {
    background: linear-gradient(135deg, rgba(168,85,247,0.18), rgba(6,182,212,0.11));
    border-left-color: var(--accent2);
    border-color: rgba(168,85,247,0.2);
    padding: 11px 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.48), 0 0 24px rgba(168,85,247,0.16);
  }

  .msg.event .msg-content {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .event-banner {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }

  .event-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent2);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 3px 8px;
    border-radius: 999px;
  }

  .event-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: calc(var(--font-size) + 3px);
    color: var(--accent);
    line-height: 1.1;
  }

  .event-subtitle {
    color: var(--text);
    font-weight: 600;
    line-height: 1.45;
    overflow-wrap: anywhere;
  }

  .event-meta {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    font-size: 11px; color: var(--sub-text);
  }

  .event-amount {
    color: #fff;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 2px 8px;
    font-weight: 700;
  }

  #status {
    position: fixed; top: 8px; right: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
    opacity: 0; transition: opacity 1s;
    z-index: 5;
  }
  #status.visible { opacity: 1; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #ef4444;
    box-shadow: 0 0 6px #ef4444;
  }
  .dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  #status span { color: var(--sub-text); }

  #guide {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; color: rgba(255,255,255,0.35);
    text-align: center; line-height: 1.8;
    flex-direction: column; gap: 8px;
  }
  #guide h2 { font-size: 20px; color: var(--accent); letter-spacing: 0.05em; }
  #guide code {
    background: rgba(255,255,255,0.08); padding: 2px 8px;
    border-radius: 4px; font-family: monospace; font-size: 11px;
    color: var(--accent2);
  }
</style>
</head>
<body>
<div id="status"><div class="dot" id="dot"></div><span id="status-text">Connecting...</span></div>
<div id="chat-wrap"></div>
<div id="goals-wrap"></div>
<div id="guide" style="display:none">
  <h2>StreamChat Overlay</h2>
  <p>Open <code>index.html</code> to configure your overlay</p>
  <p>or add URL params:<br><code>overlay.html?twitch=CHANNEL</code></p>
</div>

<script>
const params = new URLSearchParams(location.search);

const TWITCH_RAW = (params.get('twitch') || '').trim();
const KICK_RAW = (params.get('kick') || '').trim();
const YT_MULTI_RAW = (params.get('yt') || '').trim();
const YT_KEY = (params.get('yt_key') || '').trim();
const YT_VID = (params.get('yt_vid') || '').trim();

const BRAND_AVATAR = (params.get('avatar') || params.get('logo') || params.get('brand_avatar') || '').trim();
const THEME = params.get('theme') || 'neon';
const ANIM = params.get('anim') || 'slide';
const POS = params.get('pos') || 'right';
const MODE = params.get('mode') || 'all';
const LAYOUT = params.get('layout') || 'stack';

const FSIZE = Number.parseInt(params.get('size') || '14', 10);
const MAX_MSG = Number.parseInt(params.get('max') || '20', 10);
const MSG_DUR = Number.parseInt(params.get('dur') || '25', 10) * 1000;
const SHOW_STATUS = params.get('status') !== '0';
const SOUND_ENABLED = params.get('sound') !== '0';
const SOUND_VOLUME = Math.min(1, Math.max(0, Number.parseInt(params.get('vol') || '70', 10) / 100));
const DEMO = params.get('demo') === '1';

const modeDefaults = {
  all: { chat: params.get('chat') !== '0', events: params.get('events') !== '0', goals: params.get('goals') !== '0' },
  chat: { chat: true, events: false, goals: false },
  events: { chat: false, events: true, goals: false },
  goals: { chat: false, events: false, goals: true },
};
const mode = modeDefaults[MODE] ? MODE : 'all';
const featureFlags = modeDefaults[mode];

document.body.classList.add(`theme-${THEME}`, `anim-${ANIM}`, `pos-${POS}`, `layout-${LAYOUT}`, `mode-${mode}`);
document.documentElement.style.setProperty('--font-size', `${Number.isFinite(FSIZE) ? FSIZE : 14}px`);

const wrap = document.getElementById('chat-wrap');
const goalsWrap = document.getElementById('goals-wrap');
const dot = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const statusEl = document.getElementById('status');
const guide = document.getElementById('guide');

if (SHOW_STATUS) statusEl.classList.add('visible');
if (!featureFlags.chat && !featureFlags.events) wrap.style.display = 'none';
if (featureFlags.goals) goalsWrap.style.display = 'grid';

function splitCsv(value) {
  return String(value || '').split(',').map((entry) => entry.trim()).filter(Boolean);
}

function parseYouTubeSources() {
  const parsed = [];
  splitCsv(YT_MULTI_RAW).forEach((entry) => {
    const i = entry.indexOf('|');
    if (i <= 0) return;
    const apiKey = entry.slice(0, i).trim();
    const videoId = entry.slice(i + 1).trim();
    if (apiKey && videoId) parsed.push({ apiKey, videoId });
  });
  if (YT_KEY && YT_VID) parsed.push({ apiKey: YT_KEY, videoId: YT_VID });

  const seen = new Set();
  return parsed.filter((item) => {
    const id = `${item.apiKey}:${item.videoId}`;
    if (seen.has(id)) return false;
    seen.add(id);
    return true;
  });
}

const TWITCH_CHANNELS = splitCsv(TWITCH_RAW).map((entry) => entry.toLowerCase());
const KICK_CHANNELS = splitCsv(KICK_RAW).map((entry) => entry.toLowerCase());
const YOUTUBE_SOURCES = parseYouTubeSources();

const hasSource = Boolean(TWITCH_CHANNELS.length || KICK_CHANNELS.length || YOUTUBE_SOURCES.length || DEMO);
if (!hasSource) guide.style.display = 'flex';

const sourceStates = new Map();
const reconnectTimers = Object.create(null);

function setSourceState(key, label, text, connected) {
  sourceStates.set(key, { label, text, connected });
  refreshStatus();
}

function refreshStatus() {
  if (!SHOW_STATUS) return;
  const states = [...sourceStates.values()];
  const connected = states.filter((state) => state.connected);
  const pending = states.filter((state) => !state.connected && state.text);

  let label = 'Connecting...';
  let online = false;

  if (connected.length > 0) {
    label = `${connected.map((state) => state.label).join(' + ')} live`;
    online = true;
    if (pending.length > 0) {
      label += ` | ${pending.map((state) => `${state.label}: ${state.text}`).join(' | ')}`;
    }
  } else if (pending.length > 0) {
    label = `${pending[0].label}: ${pending[0].text}`;
  } else if (DEMO) {
    label = 'DEMO MODE';
    online = true;
  } else if (!hasSource) {
    label = 'No source';
  }

  statusText.textContent = label;
  dot.className = `dot${online ? ' on' : ''}`;
}

function clearReconnectTimer(sourceKey) {
  if (reconnectTimers[sourceKey]) {
    window.clearTimeout(reconnectTimers[sourceKey]);
    reconnectTimers[sourceKey] = null;
  }
}

function scheduleReconnect(sourceKey, callback, delayMs) {
  clearReconnectTimer(sourceKey);
  reconnectTimers[sourceKey] = window.setTimeout(callback, delayMs);
}

const PALETTE = ['#ff6b6b','#ffa36b','#ffd93d','#6bcb77','#4ecdc4','#45b7d1','#96ceb4','#ff6b9d','#c77dff','#74b9ff','#a29bfe','#fd79a8','#55efc4','#fdcb6e','#e17055'];
const userColors = Object.create(null);

function hashCode(value) {
  let hash = 0;
  for (let i = 0; i < value.length; i += 1) {
    hash = Math.imul(31, hash) + value.charCodeAt(i) | 0;
  }
  return hash;
}

function getColor(name) {
  if (!userColors[name]) userColors[name] = PALETTE[Math.abs(hashCode(name)) % PALETTE.length];
  return userColors[name];
}

function escHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getInitials(name) {
  const parts = String(name || 'U').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return 'U';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return `${parts[0][0]}${parts[parts.length - 1][0]}`.toUpperCase();
}

const BADGE_SVG = {
  broadcaster: '<svg viewBox="0 0 16 16" fill="none"><path d="M8 2l1.5 3 3.5.5-2.5 2.5.5 3.5L8 10l-3 1.5.5-3.5L3 5.5 6.5 5z" fill="#fff"/></svg>',
  moderator: '<svg viewBox="0 0 16 16" fill="none"><path d="M8 2L5 6H3l2 4-1 4 4-2 4 2-1-4 2-4h-2z" fill="#fff"/></svg>',
  subscriber: '<svg viewBox="0 0 16 16" fill="none"><path d="M8 3C5.2 3 3 5.2 3 8s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 2l1 2h2l-1.6 1.2.6 2L8 9.2 6 10.2l.6-2L5 7h2z" fill="#fff"/></svg>',
  vip: '<svg viewBox="0 0 16 16" fill="none"><rect x="2" y="5" width="12" height="6" rx="3" fill="#fff"/><text x="8" y="10" font-size="5" fill="#f59e0b" text-anchor="middle" font-weight="bold">VIP</text></svg>',
  partner: '<svg viewBox="0 0 16 16" fill="none"><path d="M8 2l1.5 3.5L13 6l-2.5 2.5.5 3.5L8 10.5 5 12l.5-3.5L3 6l3.5-.5z" fill="#fff"/></svg>',
  prime: '<svg viewBox="0 0 16 16" fill="none"><text x="8" y="12" font-size="10" fill="#fff" text-anchor="middle">*</text></svg>',
  'yt-member': '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5" fill="#fff"/><path d="M6 6h4v4H6z" fill="#ef4444"/></svg>',
};

const PLATFORM_MARK = { twitch: 'T', youtube: 'Y', kick: 'K' };
const PLATFORM_SVG = {

function makeBadge(type) {
  const span = document.createElement('span');
  span.className = `badge badge-${type}`;
  span.innerHTML = BADGE_SVG[type] || '';
  return span;
}

function createAvatar({ user, platform, avatarUrl, color, isEvent, icon }) {
  const el = document.createElement('div');
  el.className = 'avatar';
  el.style.background = color || getColor(user || platform || 'user');

  if (avatarUrl) {
    const img = document.createElement('img');
    img.src = avatarUrl;
    img.alt = user || 'avatar';
    img.loading = 'lazy';
    el.appendChild(img);
  } else if (isEvent) {
    el.textContent = icon || '*';
  } else {
    el.textContent = getInitials(user);
  }

  const mark = document.createElement('span');
  mark.className = 'avatar-mark';
  mark.textContent = PLATFORM_MARK[platform] || '';
  el.appendChild(mark);
  return el;
}

function buildEventMessage(base, details) {
  return {
    ...base,
    ...details,
    text: details.eventSubtitle || details.subtitle || base.text || '',
    isEvent: true,
  };
}

const goalState = {
  totalEvents: 0,
  twitchSubsGifts: 0,
  twitchRaids: 0,
  youtubeSuperChats: 0,
  kickMilestones: 0,
};

function renderGoals() {
  if (!featureFlags.goals) return;
  goalsWrap.innerHTML = [
    { t: 'Total Events', v: goalState.totalEvents, s: 'Session counters' },
    { t: 'Twitch Subs/Gifts', v: goalState.twitchSubsGifts, s: `Raids: ${goalState.twitchRaids}` },
    { t: 'YouTube Super Chats', v: goalState.youtubeSuperChats, s: 'Paid support tracked' },
    { t: 'Kick Milestones', v: goalState.kickMilestones, s: 'Follows/subs/raids' },
  ].map((item) => `<div class="goal-card"><div class="goal-title">${escHtml(item.t)}</div><div class="goal-value">${escHtml(String(item.v))}</div><div class="goal-sub">${escHtml(item.s)}</div></div>`).join('');
}

function updateGoals(message) {
  if (!featureFlags.goals || !message.isEvent) return;
  goalState.totalEvents += 1;
  const title = String(message.eventTitle || '').toLowerCase();
  if (message.platform === 'youtube' && title.includes('super chat')) goalState.youtubeSuperChats += 1;
  if (message.platform === 'kick') goalState.kickMilestones += 1;
  if (message.platform === 'twitch') {
    if (title.includes('raid')) goalState.twitchRaids += 1;
    if (title.includes('sub') || title.includes('gift')) goalState.twitchSubsGifts += 1;
  }
  renderGoals();
}

let audioContext = null;
function playTone(freq, durationMs) {
  if (!SOUND_ENABLED) return;
  try {
    if (!audioContext) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioContext = new Ctx();
    }

    const now = audioContext.currentTime;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.001, SOUND_VOLUME * 0.08), now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + (durationMs / 1000));

    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start(now);
    osc.stop(now + (durationMs / 1000));
  } catch {
    // ignore audio init issues in restricted browser sources
  }
}

function onIncomingEvent(message) {
  updateGoals(message);
  if (!featureFlags.events) return;
  if (message.platform === 'youtube') playTone(740, 220);
  else if (message.platform === 'kick') playTone(520, 190);
  else playTone(660, 210);
}

const MESSAGE_BATCH_SIZE = 8;
const MESSAGE_QUEUE_LIMIT = 120;
const messageQueue = [];
let flushScheduled = false;
let messageCount = 0;

function enqueueMessage(message) {
  if (message.isEvent && !featureFlags.events) return;
  if (!message.isEvent && !featureFlags.chat) return;

  if (messageQueue.length >= MESSAGE_QUEUE_LIMIT) {
    messageQueue.splice(0, messageQueue.length - MESSAGE_QUEUE_LIMIT + 1);
  }

  messageQueue.push(message);
  if (!flushScheduled) {
    flushScheduled = true;
    requestAnimationFrame(flushMessages);
  }
}

function flushMessages() {
  flushScheduled = false;
  const batch = messageQueue.splice(0, MESSAGE_BATCH_SIZE);
  if (batch.length === 0) return;

  const fragment = document.createDocumentFragment();
  for (let i = batch.length - 1; i >= 0; i -= 1) {
    fragment.appendChild(renderMessage(batch[i]));
  }

  wrap.insertBefore(fragment, wrap.firstChild);

  while (wrap.children.length > MAX_MSG) {
    wrap.removeChild(wrap.lastChild);
  }

  if (messageQueue.length > 0) {
    flushScheduled = true;
    requestAnimationFrame(flushMessages);
  }
}

function renderText(text, emotes) {
  const rawText = String(text || '');
  const ranges = [];

  Object.entries(emotes || {}).forEach(([id, entries]) => {
    (entries || []).forEach((entry) => {
      const start = Number(entry[0]);
      const end = Number(entry[1]);
      if (Number.isFinite(start) && Number.isFinite(end) && start >= 0 && end >= start && end < rawText.length) {
        ranges.push({ id, start, end });
      }
    });
  });

  if (ranges.length === 0) return escHtml(rawText);

  ranges.sort((a, b) => a.start - b.start || a.end - b.end);
  let html = '';
  let cursor = 0;

  ranges.forEach((range) => {
    if (range.start < cursor) return;
    html += escHtml(rawText.slice(cursor, range.start));
    const emoteText = rawText.slice(range.start, range.end + 1);
    html += `<img class="emote" src="https://static-cdn.jtvnw.net/emoticons/v2/${encodeURIComponent(range.id)}/default/dark/1.0" alt="${escHtml(emoteText)}" title="${escHtml(emoteText)}">`;
    cursor = range.end + 1;
  });

  html += escHtml(rawText.slice(cursor));
  return html;
}

function renderMessage(message) {
  const {
    user,
    color,
    text,
    badges = [],
    emotes = {},
    platform = 'twitch',
    isEvent = false,
    avatarUrl = '',
    eventIcon = '',
    eventTitle = '',
    eventSubtitle = '',
    eventMeta = [],
    eventAmount = '',
  } = message;

  const userColor = color || getColor(user || 'user');
  const card = document.createElement('div');
  card.className = `msg${isEvent ? ' event' : ''}`;
  card.id = `msg-${++messageCount}`;
  card.style.setProperty('--user-color', userColor);

  const platformIcon = document.createElement('div');
  platformIcon.className = 'platform-icon';
  platformIcon.innerHTML = PLATFORM_SVG[platform] || '';
  card.appendChild(platformIcon);

  card.appendChild(createAvatar({
    user,
    platform,
    avatarUrl: avatarUrl || BRAND_AVATAR,
    color: userColor,
    isEvent,
    icon: eventIcon,
  }));

  const content = document.createElement('div');
  content.className = 'msg-content';

  if (isEvent) {
    const banner = document.createElement('div');
    banner.className = 'event-banner';

    const chip = document.createElement('div');
    chip.className = 'event-chip';
    chip.innerHTML = `${eventIcon ? `<span>${escHtml(eventIcon)}</span>` : ''}<span>${escHtml(platform)}</span>`;
    banner.appendChild(chip);

    const title = document.createElement('div');
    title.className = 'event-title';
    title.textContent = eventTitle || user || 'Event';
    banner.appendChild(title);

    content.appendChild(banner);

    const subtitle = document.createElement('div');
    subtitle.className = 'event-subtitle';
    subtitle.textContent = eventSubtitle || text || '';
    content.appendChild(subtitle);

    const meta = document.createElement('div');
    meta.className = 'event-meta';
    (Array.isArray(eventMeta) ? eventMeta : []).forEach((entry) => {
      const pill = document.createElement('span');
      if (entry.kind === 'amount') pill.className = 'event-amount';
      pill.textContent = entry.label;
      meta.appendChild(pill);
    });
    if (eventAmount) {
      const amount = document.createElement('span');
      amount.className = 'event-amount';
      amount.textContent = eventAmount;
      meta.appendChild(amount);
    }
    if (meta.children.length > 0) content.appendChild(meta);
  } else {
    const header = document.createElement('div');
    header.className = 'msg-header';

    badges.forEach((badge) => header.appendChild(makeBadge(badge)));

    const username = document.createElement('span');
    username.className = 'username';
    username.style.color = userColor;
    username.textContent = user || 'User';
    header.appendChild(username);

    const platformTag = document.createElement('span');
    platformTag.className = `platform-tag ${platform}`;
    platformTag.textContent = platform === 'youtube' ? 'YT' : platform;
    header.appendChild(platformTag);

    content.appendChild(header);

    const textEl = document.createElement('div');
    textEl.className = 'msg-text';
    textEl.innerHTML = renderText(text, emotes);
    content.appendChild(textEl);
  }

  card.appendChild(content);

  if (MSG_DUR > 0) {
    window.setTimeout(() => {
      card.classList.add('expired');
      window.setTimeout(() => card.remove(), 600);
    }, MSG_DUR);
  }

  return card;
}

function parseTwitchEvent(tags, displayName) {
  const type = tags['msg-id'] || '';
  const viewerCount = tags['msg-param-viewerCount'] || tags['msg-param-viewer-count'] || '';
  const sender = tags['msg-param-sender-login'] || tags['msg-param-sender-name'] || '';
  const recipient = tags['msg-param-recipient-display-name'] || tags['msg-param-recipient-user-name'] || '';
  const months = tags['msg-param-cumulative-months'] || tags['msg-param-streak-months'] || '';
  const bits = tags.bits || tags['msg-param-threshold'] || '';

  const lookup = {
    sub: { icon: '*', title: 'New Subscription', subtitle: `${displayName} subscribed to the channel.` },
    resub: { icon: '*', title: 'Resubscription', subtitle: months ? `${displayName} renewed for ${months} months.` : `${displayName} renewed a subscription.` },
    subgift: { icon: '*', title: 'Gift Subscription', subtitle: recipient ? `${sender || displayName} gifted a sub to ${recipient}.` : `${sender || displayName} gifted a subscription.` },
    raid: { icon: '*', title: 'Raid Incoming', subtitle: viewerCount ? `${viewerCount} viewers arrived.` : `${displayName} raided the channel.` },
    bits: { icon: '*', title: 'Cheer', subtitle: bits ? `${displayName} cheered ${bits} bits.` : `${displayName} sent a cheer.` },
  };

  const event = lookup[type];
  if (!event) return null;

  return buildEventMessage(
    { user: displayName, platform: 'twitch', color: tags.color || null, avatarUrl: '' },
    {
      eventIcon: event.icon,
      eventTitle: event.title,
      eventSubtitle: (tags['system-msg'] || '').replace(/\s/g, ' ') || event.subtitle,
      eventMeta: [
        viewerCount ? { label: `${viewerCount} viewers`, kind: 'count' } : null,
        recipient ? { label: recipient, kind: 'user' } : null,
      ].filter(Boolean),
      eventAmount: bits ? `${bits} bits` : '',
    }
  );
}

function handleTwitchMessage(line, ws) {
  const IRC_EOL = '\r\n';
  if (line.startsWith('PING')) {
    ws.send(`PONG :tmi.twitch.tv${IRC_EOL}`);
    return;
  }

  let tags = {};
  let rest = line;

  if (line.startsWith('@')) {
    const split = line.indexOf(' ');
    const tagPart = line.slice(1, split);
    rest = line.slice(split + 1);
    tagPart.split(';').forEach((pair) => {
      const [key, value] = pair.split('=');
      tags[key] = value || '';
    });
  }

  if (rest.includes('PRIVMSG')) {
    const match = rest.match(/^:([^!]+)![^ ]+ PRIVMSG #[^ ]+ :(.*)$/);
    if (!match) return;

    const user = match[1];
    const message = match[2];

    const emotes = {};
    if (tags.emotes) {
      tags.emotes.split('/').forEach((part) => {
        if (!part) return;
        const [id, ranges] = part.split(':');
        if (!id || !ranges) return;
        emotes[id] = ranges.split(',').map((r) => r.split('-').map((v) => Number(v)));
      });
    }

    const badges = [];
    if (tags.badges) {
      if (tags.badges.includes('broadcaster')) badges.push('broadcaster');
      if (tags.badges.includes('moderator')) badges.push('moderator');
      if (tags.badges.includes('subscriber')) badges.push('subscriber');
      if (tags.badges.includes('premium')) badges.push('prime');
      if (tags.badges.includes('partner')) badges.push('partner');
      if (tags.badges.includes('vip')) badges.push('vip');
    }

    enqueueMessage({ user, color: tags.color || null, text: message, badges, emotes, platform: 'twitch' });
  }

  if (rest.includes('USERNOTICE')) {
    const displayName = tags['display-name'] || 'Streamer';
    const eventMessage = parseTwitchEvent(tags, displayName);
    if (eventMessage) {
      onIncomingEvent(eventMessage);
      enqueueMessage(eventMessage);
    }
  }
}

function connectTwitch(channel, index) {
  const IRC_EOL = '\r\n';
  const sourceKey = `twitch-${index}`;
  setSourceState(sourceKey, `Twitch#${index + 1}`, `joining #${channel}...`, false);

  const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

  ws.onopen = () => {
    ws.send(`CAP REQ :twitch.tv/tags twitch.tv/commands${IRC_EOL}`);
    ws.send(`PASS SCHMOOPIIE${IRC_EOL}NICK justinfan${Math.floor(Math.random() * 99999)}${IRC_EOL}`);
    ws.send(`JOIN #${channel}${IRC_EOL}`);
    clearReconnectTimer(sourceKey);
    setSourceState(sourceKey, `Twitch#${index + 1}`, `#${channel}`, true);
    guide.style.display = 'none';
  };

  ws.onmessage = ({ data }) => {
    data.split(IRC_EOL).forEach((line) => {
      if (!line) return;
      handleTwitchMessage(line, ws);
    });
  };

  ws.onerror = () => setSourceState(sourceKey, `Twitch#${index + 1}`, 'connection error', false);
  ws.onclose = () => {
    setSourceState(sourceKey, `Twitch#${index + 1}`, 'reconnecting...', false);
    scheduleReconnect(sourceKey, () => connectTwitch(channel, index), 5000);
  };
}

async function connectYouTube(videoId, apiKey, index) {
  const sourceKey = `youtube-${index}`;
  setSourceState(sourceKey, `YouTube#${index + 1}`, 'connecting...', false);

  try {
    const response = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${encodeURIComponent(videoId)}&key=${encodeURIComponent(apiKey)}`);
    const data = await response.json().catch(() => ({}));
    const chatId = data.items?.[0]?.liveStreamingDetails?.activeLiveChatId;

    if (!chatId) {
      setSourceState(sourceKey, `YouTube#${index + 1}`, 'no live chat found', false);
      return;
    }

    clearReconnectTimer(sourceKey);
    setSourceState(sourceKey, `YouTube#${index + 1}`, `chat ${chatId.slice(0, 8)}...`, true);
    guide.style.display = 'none';

    let pageToken = '';

    const poll = async () => {
      try {
        const url = `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${encodeURIComponent(chatId)}&part=snippet,authorDetails&key=${encodeURIComponent(apiKey)}${pageToken ? `&pageToken=${encodeURIComponent(pageToken)}` : ''}`;
        const res = await fetch(url);
        const chatData = await res.json().catch(() => ({}));

        if (!res.ok || chatData.error) {
          setSourceState(sourceKey, `YouTube#${index + 1}`, 'API error', false);
          scheduleReconnect(sourceKey, () => connectYouTube(videoId, apiKey, index), 10000);
          return;
        }

        pageToken = chatData.nextPageToken || '';

        (chatData.items || []).forEach((item) => {
          const snippet = item.snippet || {};
          const user = item.authorDetails?.displayName || 'User';
          const message = snippet.displayMessage || '';
          const avatarUrl = item.authorDetails?.profileImageUrl || '';

          const badges = [];
          if (item.authorDetails?.isChatOwner) badges.push('broadcaster');
          if (item.authorDetails?.isChatModerator) badges.push('moderator');
          if (item.authorDetails?.isChatSponsor) badges.push('yt-member');

          const eventType = String(snippet.type || '').toLowerCase();
          const superChat = snippet.superChatDetails || {};
          const milestone = snippet.memberMilestoneChatDetails || snippet.newSponsorDetails || snippet.membershipGiftingDetails || {};

          if (/superchat|supersticker/.test(eventType)) {
            const eventMessage = buildEventMessage(
              { user, platform: 'youtube', avatarUrl, color: null },
              {
                eventIcon: '$',
                eventTitle: 'Super Chat',
                eventSubtitle: superChat.userComment || message || 'Paid message highlighted the chat.',
                eventMeta: [
                  superChat.amountDisplayString ? { label: superChat.amountDisplayString, kind: 'amount' } : null,
                  superChat.tier ? { label: `Tier ${superChat.tier}`, kind: 'tier' } : null,
                ].filter(Boolean),
                eventAmount: superChat.amountDisplayString || superChat.purchaseAmountText || '',
              }
            );
            onIncomingEvent(eventMessage);
            enqueueMessage(eventMessage);
            return;
          }

          if (/member|sponsor|gift/.test(eventType)) {
            const eventMessage = buildEventMessage(
              { user, platform: 'youtube', avatarUrl, color: null },
              {
                eventIcon: '*',
                eventTitle: 'Membership Event',
                eventSubtitle: message || milestone.userComment || `${user} boosted the community.`,
                eventMeta: [
                  milestone.memberLevelName ? { label: milestone.memberLevelName, kind: 'tier' } : null,
                  milestone.months ? { label: `${milestone.months} months`, kind: 'count' } : null,
                ].filter(Boolean),
              }
            );
            onIncomingEvent(eventMessage);
            enqueueMessage(eventMessage);
            return;
          }

          enqueueMessage({ user, text: message, badges, emotes: {}, platform: 'youtube', avatarUrl });
        });

        const delay = Math.max(Number(chatData.pollingIntervalMillis || 5000), 3000);
        scheduleReconnect(sourceKey, poll, delay);
      } catch {
        setSourceState(sourceKey, `YouTube#${index + 1}`, 'reconnecting...', false);
        scheduleReconnect(sourceKey, () => connectYouTube(videoId, apiKey, index), 10000);
      }
    };

    poll();
  } catch {
    setSourceState(sourceKey, `YouTube#${index + 1}`, 'failed to connect', false);
    scheduleReconnect(sourceKey, () => connectYouTube(videoId, apiKey, index), 10000);
  }
}

function getKickAvatar(sender) {
  return sender?.profile_picture || sender?.profile_picture_url || sender?.avatar || sender?.avatar_url || '';
}

async function connectKick(channel, index) {
  const sourceKey = `kick-${index}`;
  setSourceState(sourceKey, `Kick#${index + 1}`, `loading #${channel}...`, false);

  try {
    const response = await fetch(`https://kick.com/api/v2/channels/${encodeURIComponent(channel)}`);
    const data = await response.json().catch(() => ({}));
    const chatId = data?.id;

    if (!chatId) {
      setSourceState(sourceKey, `Kick#${index + 1}`, 'channel not found', false);
      return;
    }

    const ws = new WebSocket('wss://ws-us2.pusher.com/app/32cbd69e4b950bf97679?protocol=7&client=js&version=7.4.0&flash=false');

    ws.onopen = () => {
      clearReconnectTimer(sourceKey);
      ws.send(JSON.stringify({ event: 'pusher:subscribe', data: { auth: '', channel: `chatrooms.${chatId}.v2` } }));
      setSourceState(sourceKey, `Kick#${index + 1}`, `#${channel}`, true);
      guide.style.display = 'none';
    };

    ws.onmessage = ({ data: rawData }) => {
      try {
        const event = JSON.parse(rawData);
        if (event.event !== 'App\\Events\\ChatMessageEvent') return;

        const message = JSON.parse(event.data);
        const user = message.sender?.username || 'User';
        const avatarUrl = getKickAvatar(message.sender) || BRAND_AVATAR;

        const badges = [];
        if (message.sender?.is_broadcaster) badges.push('broadcaster');
        if (message.sender?.is_moderator) badges.push('moderator');
        if (message.sender?.is_subscribed) badges.push('subscriber');

        const eventType = String(message.type || message.event || message.event_type || message.kind || '').toLowerCase();
        const isMilestone = /follow|followed|sub|subscribe|subscription|gift|raid|host|member/.test(eventType);

        if (isMilestone) {
          let icon = '*';
          let title = 'Community Event';
          if (eventType.includes('raid')) { icon = '*'; title = 'Raid Incoming'; }
          else if (eventType.includes('follow')) { icon = '+'; title = 'New Follow'; }
          else if (eventType.includes('gift')) { icon = '*'; title = 'Gifted Support'; }
          else if (eventType.includes('sub')) { icon = '*'; title = 'Subscription'; }
          else if (eventType.includes('member')) { icon = '*'; title = 'Membership'; }

          const eventMessage = buildEventMessage(
            { user, platform: 'kick', avatarUrl, color: null },
            {
              eventIcon: icon,
              eventTitle: title,
              eventSubtitle: message.content || message.message || message.body || `${user} triggered a community event.`,
              eventMeta: [],
            }
          );
          onIncomingEvent(eventMessage);
          enqueueMessage(eventMessage);
          return;
        }

        enqueueMessage({ user, text: message.content || '', badges, emotes: {}, platform: 'kick', avatarUrl });
      } catch {
        // ignore malformed packets
      }
    };

    ws.onerror = () => setSourceState(sourceKey, `Kick#${index + 1}`, 'connection error', false);
    ws.onclose = () => {
      setSourceState(sourceKey, `Kick#${index + 1}`, 'reconnecting...', false);
      scheduleReconnect(sourceKey, () => connectKick(channel, index), 5000);
    };
  } catch {
    setSourceState(sourceKey, `Kick#${index + 1}`, 'error', false);
    scheduleReconnect(sourceKey, () => connectKick(channel, index), 10000);
  }
}

  setSourceState('demo', 'Demo', 'running', true);

  let index = 0;

    const base = DEMO_MESSAGES[index % DEMO_MESSAGES.length];

          eventIcon: '*',
          eventTitle: 'Demo Event',
          eventSubtitle: base.text,
          eventMeta: [{ label: 'Demo', kind: 'tag' }],
        }
      );
      onIncomingEvent(eventMessage);
      enqueueMessage(eventMessage);
    } else {
      enqueueMessage({ ...base, emotes: {}, platform, avatarUrl: BRAND_AVATAR });
    }

    index += 1;
    window.setTimeout(loop, 1500 + Math.random() * 2000);
  };

  loop();
}

function normalizeExternalPayload(payload) {
  if (!payload || typeof payload !== 'object') return null;

  const kind = String(payload.kind || payload.type || '').toLowerCase();
  const platform = String(payload.platform || 'custom').toLowerCase();
  const user = String(payload.user || payload.username || 'Guest');
  const text = String(payload.text || payload.message || '');
  const avatarUrl = String(payload.avatarUrl || payload.avatar || BRAND_AVATAR || '');
  const color = payload.color || null;
  const badges = Array.isArray(payload.badges) ? payload.badges.filter(Boolean) : [];

  if (kind === 'event') {
    return buildEventMessage(
      { user, platform, avatarUrl, color },
      {
        eventIcon: String(payload.eventIcon || payload.icon || '*'),
        eventTitle: String(payload.eventTitle || payload.title || 'Custom Event'),
        eventSubtitle: String(payload.eventSubtitle || payload.subtitle || text || `${user} triggered an event.`),
        eventMeta: Array.isArray(payload.eventMeta) ? payload.eventMeta : [],
        eventAmount: String(payload.eventAmount || ''),
      }
    );
  }

  return {
    user,
    platform,
    text,
    avatarUrl,
    color,
    badges,
    emotes: {},
  };
}

window.addEventListener('message', (event) => {
  const payload = normalizeExternalPayload(event.data);
  if (!payload) return;
  if (payload.isEvent) onIncomingEvent(payload);
  enqueueMessage(payload);
});

if (featureFlags.goals) renderGoals();
if (DEMO) runDemo();

TWITCH_CHANNELS.forEach((channel, index) => connectTwitch(channel, index));
YOUTUBE_SOURCES.forEach((source, index) => connectYouTube(source.videoId, source.apiKey, index));
KICK_CHANNELS.forEach((channel, index) => connectKick(channel, index));

if (!hasSource && !DEMO) refreshStatus();
</script>
